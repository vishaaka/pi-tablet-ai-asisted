<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi Tablet Parent Panel</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #202531;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --danger: #dc2626;
      --success: #059669;
      --shadow: 0 10px 25px rgba(0,0,0,0.06);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1300px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .title-wrap h1 {
      margin: 0 0 6px 0;
      font-size: 28px;
    }

    .title-wrap p {
      margin: 0;
      color: var(--muted);
    }

    .status-pill {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 700;
      font-size: 14px;
    }

    input[type="text"],
    textarea,
    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .thumb-preview-panel {
      margin-top: 8px;
    }

    .thumb-title {
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .thumb-box {
      width: 100%;
      max-width: 260px;
      height: 260px;
      border: 2px dashed #c7ced8;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #fafafa;
    }

    #assetThumbPreview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #assetThumbPlaceholder {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 16px;
    }

    .form-actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }

    button.secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    button.danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-box {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .stat-box .k {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .stat-box .v {
      font-size: 24px;
      font-weight: 800;
    }

    .assets-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .assets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .asset-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .asset-thumb {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: #f3f4f6;
    }

    .asset-content {
      padding: 14px;
    }

    .asset-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 8px 0;
    }

    .asset-meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0 10px 0;
    }

    .tag {
      background: #f3f4f6;
      color: #374151;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
    }

    .asset-notes {
      font-size: 14px;
      color: #374151;
      min-height: 36px;
      margin-bottom: 12px;
    }

    .asset-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .muted {
      color: var(--muted);
    }

    .message {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 700;
    }

    .message.ok {
      color: var(--success);
    }

    .message.err {
      color: var(--danger);
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 560px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Pi Tablet Parent Panel</h1>
        <p>Manuel asset oluşturma ve thumbnail önizleme paneli</p>
      </div>
      <div id="serverStatus" class="status-pill">Server kontrol ediliyor...</div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="k">Toplam Asset</div>
        <div class="v" id="statAssetCount">0</div>
      </div>
      <div class="stat-box">
        <div class="k">Preferred</div>
        <div class="v" id="statPreferredCount">0</div>
      </div>
      <div class="stat-box">
        <div class="k">Toplam Usage</div>
        <div class="v" id="statUsageCount">0</div>
      </div>
      <div class="stat-box">
        <div class="k">Toplam Success</div>
        <div class="v" id="statSuccessCount">0</div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Manuel Asset Oluştur</h2>

        <div class="form-grid">
          <div class="form-row">
            <label for="assetLabel">Asset Adı</label>
            <input id="assetLabel" type="text" placeholder="örn: top">
          </div>

          <div class="form-row">
            <label for="assetTags">Etiketler</label>
            <input id="assetTags" type="text" placeholder="örn: oyuncak, yuvarlak">
          </div>

          <div class="form-row">
            <label for="assetInterests">İlgi Alanları</label>
            <input id="assetInterests" type="text" placeholder="örn: top, oyun">
          </div>

          <div class="form-row">
            <label for="assetNotes">Notlar</label>
            <textarea id="assetNotes" placeholder="örn: kırmızı plastik top"></textarea>
          </div>

          <div class="form-row">
            <label for="assetImageFile">Görsel Seç</label>
            <input id="assetImageFile" type="file" accept="image/*">
          </div>

          <div class="form-row checkbox-row">
            <input id="assetPreferred" type="checkbox">
            <label for="assetPreferred" style="margin:0;">Preferred olarak işaretle</label>
          </div>
        </div>

        <div class="thumb-preview-panel">
          <div class="thumb-title">Thumbnail Önizleme</div>
          <div class="thumb-box">
            <img id="assetThumbPreview" src="" alt="thumb">
            <div id="assetThumbPlaceholder">Henüz görsel seçilmedi</div>
          </div>
        </div>

        <div class="form-actions">
          <button onclick="createManualAsset()">Asset Oluştur</button>
          <button class="secondary" onclick="resetAssetForm()">Formu Temizle</button>
        </div>

        <div id="formMessage" class="message"></div>
      </div>

      <div class="card">
        <div class="assets-header">
          <h2 style="margin:0;">Asset Kütüphanesi</h2>
          <button class="secondary" onclick="refreshAll()">Yenile</button>
        </div>
        <div id="assetsGrid" class="assets-grid"></div>
      </div>
    </div>
  </div>

  <script>
    const assetImageInput = document.getElementById("assetImageFile");
    const thumbPreview = document.getElementById("assetThumbPreview");
    const thumbPlaceholder = document.getElementById("assetThumbPlaceholder");
    const formMessage = document.getElementById("formMessage");

    function setMessage(text, ok = true) {
      formMessage.textContent = text || "";
      formMessage.className = ok ? "message ok" : "message err";
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderTags(items) {
      if (!items || !items.length) return "";
      return items.map(x => `<span class="tag">${escapeHtml(x)}</span>`).join("");
    }

    function resetAssetForm() {
      document.getElementById("assetLabel").value = "";
      document.getElementById("assetTags").value = "";
      document.getElementById("assetInterests").value = "";
      document.getElementById("assetNotes").value = "";
      document.getElementById("assetPreferred").checked = false;
      document.getElementById("assetImageFile").value = "";

      thumbPreview.style.display = "none";
      thumbPreview.src = "";
      thumbPlaceholder.style.display = "block";

      setMessage("");
    }

    if (assetImageInput) {
      assetImageInput.addEventListener("change", function () {
        const file = this.files && this.files[0];

        if (!file) {
          thumbPreview.style.display = "none";
          thumbPreview.src = "";
          thumbPlaceholder.style.display = "block";
          return;
        }

        const reader = new FileReader();
        reader.onload = function (e) {
          thumbPreview.src = e.target.result;
          thumbPreview.style.display = "block";
          thumbPlaceholder.style.display = "none";
        };
        reader.readAsDataURL(file);
      });
    }

    async function loadServerStatus() {
      try {
        const res = await fetch("/server/status");
        const data = await res.json();

        if (data.ok) {
          document.getElementById("serverStatus").textContent = `Server aktif • ${data.asset_count} asset`;
        } else {
          document.getElementById("serverStatus").textContent = "Server hatası";
        }
      } catch (err) {
        document.getElementById("serverStatus").textContent = "Server erişilemedi";
      }
    }

    async function loadStats() {
      try {
        const res = await fetch("/assets/stats");
        const data = await res.json();

        if (!data.ok) return;

        document.getElementById("statAssetCount").textContent = data.asset_count ?? 0;
        document.getElementById("statPreferredCount").textContent = data.preferred_count ?? 0;
        document.getElementById("statUsageCount").textContent = data.total_usage ?? 0;
        document.getElementById("statSuccessCount").textContent = data.total_success ?? 0;
      } catch (err) {
        console.error(err);
      }
    }

    async function loadAssets() {
      const grid = document.getElementById("assetsGrid");
      grid.innerHTML = `<div class="muted">Yükleniyor...</div>`;

      try {
        const res = await fetch("/assets/list");
        const data = await res.json();

        if (!data.ok) {
          grid.innerHTML = `<div class="muted">Asset listesi alınamadı</div>`;
          return;
        }

        const items = data.items || [];
        if (!items.length) {
          grid.innerHTML = `<div class="muted">Henüz asset yok</div>`;
          return;
        }

        grid.innerHTML = items.map(item => {
          const tags = renderTags(item.tags || []);
          const interests = renderTags(item.interests || []);
          const notes = escapeHtml(item.notes || "");
          const label = escapeHtml(item.label || "");
          const thumb = escapeHtml(item.thumb_path || "");
          const assetId = escapeHtml(item.asset_id || "");
          const preferred = item.preferred ? `<span class="tag">preferred</span>` : "";

          return `
            <div class="asset-card">
              <img class="asset-thumb" src="${thumb}" alt="${label}">
              <div class="asset-content">
                <div class="asset-title">${label}</div>
                <div class="asset-meta">ID: ${assetId}</div>
                <div class="tag-list">${preferred}</div>
                <div class="tag-list">${tags}</div>
                <div class="tag-list">${interests}</div>
                <div class="asset-notes">${notes || "Not yok"}</div>
                <div class="asset-meta">Usage: ${item.usage_count || 0} • Success: ${item.success_count || 0} • Fail: ${item.fail_count || 0}</div>
                <div class="asset-actions">
                  <button class="danger" onclick="deleteAsset('${assetId}')">Sil</button>
                </div>
              </div>
            </div>
          `;
        }).join("");
      } catch (err) {
        console.error(err);
        grid.innerHTML = `<div class="muted">Bir hata oluştu</div>`;
      }
    }

    async function createManualAsset() {
      const label = document.getElementById("assetLabel").value.trim();
      const tags = document.getElementById("assetTags").value.trim();
      const interests = document.getElementById("assetInterests").value.trim();
      const notes = document.getElementById("assetNotes").value.trim();
      const preferred = document.getElementById("assetPreferred").checked;
      const imageFile = document.getElementById("assetImageFile").files[0];

      if (!label) {
        setMessage("Asset adı gerekli", false);
        return;
      }

      if (!imageFile) {
        setMessage("Bir görsel seçmelisin", false);
        return;
      }

      try {
        const formData = new FormData();
        formData.append("label", label);
        formData.append("tags", tags);
        formData.append("interests", interests);
        formData.append("notes", notes);
        formData.append("preferred", preferred ? "true" : "false");
        formData.append("image", imageFile);

        const res = await fetch("/assets/create_manual", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        if (data.ok) {
          setMessage("Asset başarıyla oluşturuldu", true);
          resetAssetForm();
          await refreshAll();
        } else {
          setMessage(data.error || data.detail || "Asset oluşturulamadı", false);
        }
      } catch (err) {
        console.error(err);
        setMessage("İstek sırasında hata oluştu", false);
      }
    }

    async function deleteAsset(assetId) {
      if (!confirm(`Bu asset silinsin mi?\n${assetId}`)) {
        return;
      }

      try {
        const formData = new FormData();
        formData.append("asset_id", assetId);

        const res = await fetch("/assets/delete", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        if (data.ok) {
          await refreshAll();
        } else {
          alert(data.error || data.detail || "Silme başarısız");
        }
      } catch (err) {
        console.error(err);
        alert("Silme sırasında hata oluştu");
      }
    }

    async function refreshAll() {
      await loadServerStatus();
      await loadStats();
      await loadAssets();
    }

    refreshAll();
  </script>
</body>
</html>
