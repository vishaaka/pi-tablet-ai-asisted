<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pi Tablet Hazir</title>
  <style>
    :root {
      color-scheme: light;
      --bg-1: #f6f1e7;
      --bg-2: #dfeee6;
      --ink: #1f2a2e;
      --muted: #587074;
      --card: rgba(255, 252, 247, 0.84);
      --accent: #ef8b57;
      --accent-2: #7ab596;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(239, 139, 87, 0.24), transparent 28%),
        radial-gradient(circle at bottom right, rgba(122, 181, 150, 0.28), transparent 30%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
    }

    .card {
      width: min(760px, calc(100vw - 48px));
      padding: 42px 38px;
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 24px 80px rgba(31, 42, 46, 0.16);
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: 1.6;
      color: var(--muted);
    }

    .chips {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.95rem;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(31, 42, 46, 0.08);
    }

    .chip.accent {
      background: rgba(239, 139, 87, 0.16);
      border-color: rgba(239, 139, 87, 0.24);
    }

    .chip.soft {
      background: rgba(122, 181, 150, 0.16);
      border-color: rgba(122, 181, 150, 0.24);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Pi kiosk hazir</h1>
    <p>
      Tablet oturumu sade kiosk modunda acildi. Gercek uygulamayi baslatmak icin
      sadece <strong>/etc/pitablet/kiosk.env</strong> icindeki <strong>KIOSK_URL</strong>
      degerini guncellemen yeterli.
    </p>
    <div class="chips">
      <div class="chip accent">autologin: pi</div>
      <div class="chip">oturum: labwc</div>
      <div class="chip soft">tarayici: chromium kiosk</div>
    </div>
  </main>
</body>
</html>
